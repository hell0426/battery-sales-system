name: 后端 CI (自动编译 + 跑测试)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: battery_sales
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 导入数据库表结构和初始数据
        run: |
          # 等待 MySQL 就绪，然后导入建库脚本
          for i in $(seq 1 10); do
            mysql -h 127.0.0.1 -u root -p"123456" battery_sales < battery_sales.sql 2>/dev/null && break
            echo "等待 MySQL 启动... ($i/10)"
            sleep 5
          done

      - name: 编译并跑测试
        run: cd backend && mvn test -B
